{% extends "base.html" %}
{% block content %}

<style>
/* ================= ANIMATED GRADIENT BACKGROUND ================= */
.gradient-bg-login {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(
        -45deg,
        #FF9933, /* saffron */
        #ffffff, /* white */
        #138808, /* green */
        #3b82f6  /* blue */
    );
    background-size: 400% 400%;
    animation: gradientShift 25s ease infinite;
    z-index: -1;
}

@keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* ================= GLASS FORM ================= */
.login-section {
    min-height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 5rem 1rem;
}

.glass-login {
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(16px);
    border-radius: 24px;
    padding: 3rem 2rem;
    box-shadow: 0 20px 40px rgba(0,0,0,0.15);
    max-width: 450px;
    width: 100%;
}

.glass-login h2 {
    text-align: center;
    font-weight: 800;
    margin-bottom: 2rem;
    color: #0c2340;
}

.glass-login .form-control {
    border-radius: 12px;
    padding: 0.75rem 1rem;
    margin-bottom: 1rem;
    border: 1px solid #ccc;
}

.glass-login .btn-primary {
    width: 100%;
    border-radius: 12px;
    padding: 0.75rem;
    font-weight: bold;
    background-color: #3b82f6;
    border: none;
    transition: 0.3s;
}

.glass-login .btn-primary:hover {
    background-color: #2563eb;
}

.glass-login .btn-link {
    display: block;
    text-align: center;
    margin-top: 1rem;
    color: #138808;
    font-weight: bold;
}

</style>

<!-- Animated Background -->
<div class="gradient-bg-login"></div>

<section class="login-section">
  <div class="glass-login">
    <h2>Login</h2>
    <form method="POST">
      <div class="mb-2">
        <input type="text" name="username" class="form-control" placeholder="Username" required>
      </div>
      <div class="mb-2">
        <input type="password" name="password" class="form-control" placeholder="Password" required>
      </div>
      <button class="btn btn-primary" type="submit">Login</button>
      <a href="{{ url_for('register') }}" class="btn btn-link">Register</a>
    </form>
  </div>
</section>

{% endblock %}
