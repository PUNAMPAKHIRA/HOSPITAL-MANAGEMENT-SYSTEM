{% extends 'base.html' %}
{% block content %}

<style>
.card-glass {
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(16px);
    border-radius: 20px;
    padding: 2rem;
    box-shadow: 0 15px 30px rgba(0,0,0,0.12);
    margin-top: 2rem;
    max-width: 600px;
    margin-left: auto;
    margin-right: auto;
}

h3 {
    font-weight: 700;
    color: #0c2340;
    margin-bottom: 1rem;
}

p {
    font-size: 1rem;
    color: #1e293b;
}

.btn-success {
    border-radius: 12px;
    padding: 0.5rem 1.5rem;
    transition: 0.3s;
}

.btn-success:hover {
    opacity: 0.9;
}
</style>

<div class="card card-glass text-center">
    <h3>👩‍⚕️ {{ doc.user.name }} — {{ doc.specialization }}</h3>
    <p><strong>Department:</strong> {{ doc.department.name if doc.department else '—' }}</p>
    <p><strong>Availability:</strong><br/> {{ doc.availability }}</p>
    <p>
        <a class="btn btn-success" href="{{ url_for('book_appointment', doc_id=doc.id) }}">
            Book Appointment
        </a>
    </p>
</div>

{% endblock %}
