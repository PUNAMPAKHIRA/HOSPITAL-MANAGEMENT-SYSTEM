{% extends "base.html" %}
{% block content %}

<!-- Animated Gradient Background -->
<div style="position: fixed; top:0; left:0; width:100%; height:100%; z-index:-1;
    background: linear-gradient(-45deg,#FF9933,#ffffff,#138808,#3b82f6);
    background-size: 400% 400%;
    animation: gradientShift 20s ease infinite;"></div>

<style>
@keyframes gradientShift {
    0% { background-position:0% 50%; }
    50% { background-position:100% 50%; }
    100% { background-position:0% 50%; }
}

.glass-form {
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(16px);
    border-radius: 24px;
    padding: 3rem 2rem;
    box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    margin-top: 5rem;
}

.glass-form h2 {
    font-weight: 800;
    text-align: center;
    margin-bottom: 2rem;
}

.glass-form input, 
.glass-form select {
    border-radius: 12px;
    padding: 0.75rem 1rem;
    border: 1px solid #ccc;
    font-size: 1rem;
    transition: all 0.3s ease;
}

.glass-form input:focus,
.glass-form select:focus {
    border-color: #138808;
    box-shadow: 0 0 10px rgba(19,136,8,0.3);
    outline: none;
}

.glass-form button {
    border-radius: 12px;
    padding: 0.75rem 2rem;
    font-size: 1.1rem;
    font-weight: bold;
    transition: all 0.3s ease;
}

.glass-form button:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(19,136,8,0.4);
}

.glass-form a {
    color: #138808;
    text-decoration: underline;
}

@media(max-width:768px){
    .glass-form { padding: 2rem 1rem; margin-top:3rem; }
}
</style>

<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="glass-form">
      <h2>Register at Bharat Sevashram Hospital</h2>
      <form method="POST">
        <div class="row mb-3">
          <div class="col">
            <input name="name" class="form-control" placeholder="Full Name" required>
          </div>
          <div class="col">
            <input name="username" class="form-control" placeholder="Username" required>
          </div>
        </div>

        <div class="row mb-3">
          <div class="col">
            <input name="contact" class="form-control" placeholder="Contact">
          </div>
          <div class="col">
            <input name="password" type="password" class="form-control" placeholder="Password" required>
          </div>
        </div>

        <div class="mb-3">
          <label>Role</label>
          <select name="role" id="role" class="form-select" required onchange="toggleFields()">
            <option value="">Select role</option>
            <option value="patient">Patient</option>
            <option value="doctor">Doctor</option>
          </select>
        </div>

        <div id="patientFields" style="display:none;">
          <div class="row mb-3">
            <div class="col">
              <input type="number" name="age" class="form-control" placeholder="Age">
            </div>
            <div class="col">
              <select name="gender" class="form-select">
                <option value="">Gender</option>
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
              </select>
            </div>
          </div>
        </div>

        <div id="doctorFields" style="display:none;">
          <label>Department</label>
          <select name="specialization" class="form-select mb-3">
            <option value="">Select Department</option>
            {% for dept in departments %}
              <option value="{{ dept.name }}">{{ dept.name }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="text-center">
          <button class="btn btn-success" type="submit">Register</button>
        </div>
      </form>
      <p class="mt-3 text-center"><a href="{{ url_for('login') }}">Back to login</a></p>
    </div>
  </div>
</div>

<script>
function toggleFields(){
  var r = document.getElementById('role').value;
  document.getElementById('patientFields').style.display = (r === 'patient') ? 'block' : 'none';
  document.getElementById('doctorFields').style.display = (r === 'doctor') ? 'block' : 'none';
}
</script>

{% endblock %}
