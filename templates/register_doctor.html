{% extends "base.html" %}
{% block content %}

<style>
.card-glass {
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(16px);
    border-radius: 20px;
    padding: 2rem;
    box-shadow: 0 15px 30px rgba(0,0,0,0.12);
}

h4 {
    color: #0c2340;
    font-weight: 700;
    margin-bottom: 1.5rem;
}

input.form-control {
    border-radius: 12px;
    padding: 10px;
}

button {
    background-color: #0d6efd;
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    opacity: 0.9;
}
</style>

<div class="row justify-content-center mt-5">
  <div class="col-md-7">
    <div class="card card-glass p-4 shadow-sm">

      <h4 class="text-center">👨‍⚕️ Doctor Registration</h4>

      <form method="post" action="{{ url_for('register_doctor') }}">
        <div class="mb-3">
          <input name="username" class="form-control" placeholder="Username" required>
        </div>
        <div class="mb-3">
          <input name="name" class="form-control" placeholder="Full Name (e.g. Dr. Name)" required>
        </div>
        <div class="mb-3">
          <input name="password" type="password" class="form-control" placeholder="Password" required>
        </div>
        <div class="mb-3">
          <input name="specialization" class="form-control" placeholder="Specialization" required>
        </div>
        <div class="mb-3">
          <input name="contact" class="form-control" placeholder="Contact">
        </div>

        <button class="btn btn-primary w-100">Register (await admin approval)</button>
      </form>

      <p class="text-center mt-3">
        <a href="{{ url_for('login') }}" class="text-decoration-none text-primary">⬅ Back to Login</a>
      </p>

    </div>
  </div>
</div>

{% endblock %}
